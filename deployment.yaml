apiVersion: apps/v1
kind: Deployment
metadata:
  name: gps-deployment-task2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gps-app
  template:
    metadata:
      labels:
        app: gps-app
    spec:
      containers:
      - name: gps-container
        image: lab7task2
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
